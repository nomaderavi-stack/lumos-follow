<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumos Follow</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>LUMOS FOLLOW</h1>

  <script src="app.js"></script>
