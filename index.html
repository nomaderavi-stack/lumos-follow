<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumos Follow</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <div class="card">
    <h1>Lumos Follow</h1>

    <p>
      Lumos revela quem não te segue de volta e ajuda você a limpar seu Instagram com inteligência.
    </p>

    <input id="usuario" type="text" placeholder="@usuario">

    <button id="btnMagic">Aperte e veja a magia acontecer ✨</button>
  </div>

  <!-- LOADING -->
  <div id="loading" class="overlay hidden">
    <div class="box">
      <h1>LUMOS</h1>
      <p>Analisando seguidores...</p>
    </div>
  </div>

  <!-- RESULTADO -->
  <div id="result" class="overlay hidden">
    <div class="box" id="resultBox">
      <h1>Resultado</h1>

      <button id="closeResult">Fechar</button>
    </div>
  </div>

  <script src="./js/app.js" defer></script>

</body>
</html>
