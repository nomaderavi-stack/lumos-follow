<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumos Follow V5</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<div class="card">

    <h1>Lumos Follow</h1>

    <p>
        Lumos revela quem não te segue de volta e limpa seu Instagram com inteligência.
    </p>

    <input id="usuario" type="text" placeholder="@usuario">

    <button id="btnMagic">
        Aperte e veja a magia acontecer ✨
    </button>

</div>

<!-- OVERLAY MAGIA -->
<div id="magicOverlay" class="overlay hidden">

    <div class="lumosTitle">LUMOS</div>

    <div class="scanner"></div>

    <div id="statusText">Conectando ao Instagram...</div>

</div>

<!-- RESULTADO -->
<div id="result" class="overlay hidden">

    <div class="box">

        <h1>RESULTADO LUMOS</h1>

        <p>🚫 @usuario1 não te segue de volta</p>
        <p>🚫 @usuario2 não te segue de volta</p>
        <p>🚫 @usuario3 não te segue de volta</p>

        <button id="closeResult">Fechar</button>

    </div>

</div>

<script src="./js/app.js"></script>

</body>
</html>
