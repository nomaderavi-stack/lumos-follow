<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumos Follow V7</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <div class="card">
    <h1>Lumos Follow</h1>

    <p>Analise quem não te segue de volta com IA mágica ✨</p>

    <input id="usuario" type="text" placeholder="@usuario">

    <button id="btnMagic">
      Aperte e veja a magia ✨
    </button>
  </div>

  <!-- LOADING -->
  <div id="loading" class="overlay hidden">
    <div class="box">
      <h1>LUMOS</h1>
      <p id="loadingText">Iniciando scanner...</p>
    </div>
  </div>

  <!-- RESULTADO -->
  <div id="result" class="overlay hidden">
    <div class="box">

      <h1>Resultado</h1>

      <div id="resultList"></div>

      <button id="closeResult">Fechar</button>

    </div>
  </div>

  <script src="./js/app.js"></script>

</body>
</html>
